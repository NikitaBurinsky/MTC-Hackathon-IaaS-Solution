name: DB Bootstrap

on:
  workflow_dispatch:

jobs:
  bootstrap-db:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap PostgreSQL on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            APP_DIR="${{ vars.VPS_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then APP_DIR="/opt/iaas-hackathon"; fi
            export APP_DIR
            export POSTGRES_USER="${{ vars.POSTGRES_USER }}"
            export POSTGRES_DB="${{ vars.POSTGRES_DB }}"
            bash "${APP_DIR}/scripts/vps/bootstrap_db.sh"
