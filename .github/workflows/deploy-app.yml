name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API + Nginx to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            APP_DIR="${{ vars.VPS_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then APP_DIR="/opt/iaas-hackathon"; fi
            export APP_DIR
            export DOMAIN="${{ secrets.DOMAIN }}"
            export LETSENCRYPT_EMAIL="${{ secrets.LETSENCRYPT_EMAIL }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            bash "${APP_DIR}/scripts/vps/deploy_app.sh"
