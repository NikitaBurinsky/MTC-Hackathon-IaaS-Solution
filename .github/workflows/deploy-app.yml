name: Deploy App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_repo: ${{ steps.image.outputs.image_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image reference
        id: image
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}/iaas-api"
          IMAGE_REF="${IMAGE_REPO}:${GITHUB_SHA}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.image_repo }}:latest

  deploy-on-vps:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "infra/docker/docker-compose.app.yml,infra/nginx/nginx.conf,infra/nginx/nginx.https.template.conf"
          target: "/tmp/iaas-deploy-${{ github.run_id }}"
          overwrite: true

      - name: Pull image from GHCR and deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            APP_DIR="${{ vars.VPS_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then APP_DIR="/opt/iaas-hackathon"; fi

            DOMAIN="${{ secrets.DOMAIN }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            COOKIE_SAMESITE="${{ vars.COOKIE_SAMESITE }}"
            COOKIE_SECURE="${{ vars.COOKIE_SECURE }}"
            PROXYAPI_API_KEY="${{ secrets.PROXYAPI_API_KEY }}"
            PROXYAPI_BASE_URL="${{ vars.PROXYAPI_BASE_URL }}"
            if [ -z "${PROXYAPI_BASE_URL}" ]; then PROXYAPI_BASE_URL="https://api.proxyapi.ru/openrouter/v1"; fi
            PROXYAPI_MODEL="${{ vars.PROXYAPI_MODEL }}"
            if [ -z "${PROXYAPI_MODEL}" ]; then PROXYAPI_MODEL="deepseek/deepseek-chat"; fi
            PROXYAPI_TIMEOUT_SEC="${{ vars.PROXYAPI_TIMEOUT_SEC }}"
            if [ -z "${PROXYAPI_TIMEOUT_SEC}" ]; then PROXYAPI_TIMEOUT_SEC="120"; fi
            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}"
            GHCR_USER="${{ github.actor }}"
            GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            DEPLOYMENT_PUBLIC_PATH_PREFIX="${{ vars.DEPLOYMENT_PUBLIC_PATH_PREFIX }}"
            if [ -z "${DEPLOYMENT_PUBLIC_PATH_PREFIX}" ]; then DEPLOYMENT_PUBLIC_PATH_PREFIX="hosted"; fi
            DEPLOYMENT_PUBLIC_SCHEME="${{ vars.DEPLOYMENT_PUBLIC_SCHEME }}"
            if [ -z "${DEPLOYMENT_PUBLIC_SCHEME}" ]; then DEPLOYMENT_PUBLIC_SCHEME="https"; fi
            NGINX_CONTAINER_NAME="${{ vars.NGINX_CONTAINER_NAME }}"
            if [ -z "${NGINX_CONTAINER_NAME}" ]; then NGINX_CONTAINER_NAME="iaas-nginx"; fi
            DEPLOYMENT_NETWORK_NAME="${{ vars.DEPLOYMENT_NETWORK_NAME }}"
            if [ -z "${DEPLOYMENT_NETWORK_NAME}" ]; then DEPLOYMENT_NETWORK_NAME="iaas-backbone"; fi

            if [ -z "${DOMAIN}" ] || [ -z "${JWT_SECRET}" ] || [ -z "${DATABASE_URL}" ] || [ -z "${PROXYAPI_API_KEY}" ] || [ -z "${IMAGE_REF}" ]; then
              echo "Required secrets/outputs are missing"
              exit 1
            fi

            DEPLOY_TMP="/tmp/iaas-deploy-${{ github.run_id }}"
            mkdir -p "${APP_DIR}/infra/docker" "${APP_DIR}/infra/nginx"

            cp -f "${DEPLOY_TMP}/infra/docker/docker-compose.app.yml" "${APP_DIR}/infra/docker/docker-compose.app.yml"
            cp -f "${DEPLOY_TMP}/infra/nginx/nginx.conf" "${APP_DIR}/infra/nginx/nginx.conf"
            cp -f "${DEPLOY_TMP}/infra/nginx/nginx.https.template.conf" "${APP_DIR}/infra/nginx/nginx.https.template.conf"
            rm -rf "${DEPLOY_TMP}"

            sed -i '1s/^\xEF\xBB\xBF//' "${APP_DIR}/infra/nginx/nginx.conf"
            sed -i '1s/^\xEF\xBB\xBF//' "${APP_DIR}/infra/nginx/nginx.https.template.conf"

            docker network inspect "${DEPLOYMENT_NETWORK_NAME}" >/dev/null 2>&1 || docker network create "${DEPLOYMENT_NETWORK_NAME}"

            NGINX_RUNTIME_CONF="${{ vars.NGINX_RUNTIME_CONF }}"
            if [ -z "${NGINX_RUNTIME_CONF}" ]; then NGINX_RUNTIME_CONF="/tmp/iaas-nginx.conf/nginx.conf"; fi
            if [ -z "${COOKIE_SAMESITE}" ]; then COOKIE_SAMESITE="lax"; fi
            if [ -z "${COOKIE_SECURE}" ]; then COOKIE_SECURE="true"; fi

            cp "${APP_DIR}/infra/nginx/nginx.conf" "${NGINX_RUNTIME_CONF}"

            export DATABASE_URL
            export JWT_SECRET
            export PROXYAPI_API_KEY
            export PROXYAPI_BASE_URL
            export PROXYAPI_MODEL
            export PROXYAPI_TIMEOUT_SEC
            export DOMAIN
            export COOKIE_SAMESITE
            export COOKIE_SECURE
            export DEPLOYMENT_PUBLIC_PATH_PREFIX
            export DEPLOYMENT_PUBLIC_SCHEME
            export NGINX_CONTAINER_NAME
            export DEPLOYMENT_NETWORK_NAME
            export NGINX_CONF_PATH="${NGINX_RUNTIME_CONF}"
            export APP_IMAGE="${IMAGE_REF}"

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            docker compose -f "${APP_DIR}/infra/docker/docker-compose.app.yml" pull api
            docker compose -f "${APP_DIR}/infra/docker/docker-compose.app.yml" up -d api nginx

            sed "s/\${DOMAIN}/${DOMAIN}/g" "${APP_DIR}/infra/nginx/nginx.https.template.conf" > "${NGINX_RUNTIME_CONF}"
            docker compose -f "${APP_DIR}/infra/docker/docker-compose.app.yml" up -d nginx
            sed -i '1s/^\xEF\xBB\xBF//' "${NGINX_RUNTIME_CONF}"
            docker compose -f "${APP_DIR}/infra/docker/docker-compose.app.yml" exec -T nginx nginx -t
            docker compose -f "${APP_DIR}/infra/docker/docker-compose.app.yml" exec -T nginx nginx -s reload

            echo "Deploy finished with image ${IMAGE_REF}."
