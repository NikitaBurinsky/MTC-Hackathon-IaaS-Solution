services:
  api:
    container_name: iaas-api
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Hackathon IaaS API}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/iaas}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
    networks:
      - backbone

  nginx:
    image: nginx:1.27-alpine
    container_name: iaas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF_PATH:-../nginx/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - api
    networks:
      - backbone

  certbot:
    image: certbot/certbot:latest
    container_name: iaas-certbot
    profiles:
      - tools
    volumes:
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - backbone

volumes:
  certbot-www:
  letsencrypt:

networks:
  backbone:
    name: iaas-backbone
    external: true
