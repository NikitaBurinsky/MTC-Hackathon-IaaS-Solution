services:
  api:
    container_name: iaas-api
    image: ${APP_IMAGE}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Hackathon IaaS API}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/iaas}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DOMAIN: ${DOMAIN:-}
      PROXYAPI_API_KEY: ${PROXYAPI_API_KEY:-}
      PROXYAPI_BASE_URL: ${PROXYAPI_BASE_URL:-https://api.proxyapi.ru/openrouter/v1}
      PROXYAPI_MODEL: ${PROXYAPI_MODEL:-deepseek/deepseek-chat}
      PROXYAPI_TIMEOUT_SEC: ${PROXYAPI_TIMEOUT_SEC:-120}
      DEPLOYMENT_NETWORK_NAME: ${DEPLOYMENT_NETWORK_NAME:-iaas-backbone}
      NGINX_CONTAINER_NAME: ${NGINX_CONTAINER_NAME:-iaas-nginx}
      DEPLOYMENT_PUBLIC_PATH_PREFIX: ${DEPLOYMENT_PUBLIC_PATH_PREFIX:-hosted}
      DEPLOYMENT_PUBLIC_SCHEME: ${DEPLOYMENT_PUBLIC_SCHEME:-https}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      CPU_PRICE_PER_VCPU_MIN: ${CPU_PRICE_PER_VCPU_MIN:-1}
      RAM_PRICE_PER_GB_MIN: ${RAM_PRICE_PER_GB_MIN:-5}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backbone

  nginx:
    image: nginx:1.27-alpine
    container_name: iaas-nginx
    restart: unless-stopped
    command: /bin/sh -c "mkdir -p /etc/nginx/deployment-locations && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF_PATH:-../nginx/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - backbone

networks:
  backbone:
    name: ${DEPLOYMENT_NETWORK_NAME:-iaas-backbone}
    external: true
