services:
  api:
    container_name: iaas-api
    image: ${APP_IMAGE}
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Hackathon IaaS API}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/iaas}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backbone

  nginx:
    image: nginx:1.27-alpine
    container_name: iaas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF_PATH:-../nginx/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - backbone

networks:
  backbone:
    name: iaas-backbone
    external: true