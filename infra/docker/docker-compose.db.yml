services:
  postgres:
    image: postgres:16-alpine
    container_name: iaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iaas}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-iaas}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backbone

volumes:
  pgdata:
    name: iaas-postgres-data

networks:
  backbone:
    name: iaas-backbone
    external: true
